server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  expiration-time: 10800000

